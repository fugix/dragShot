<div class="app-shell">
  <!-- Header -->
  <header class="app-header">
    <div class="brand">
      <span class="brand-icon">📸</span>
      <span class="brand-name">DragShot</span>
    </div>
    <nav class="app-nav">
      <button
        class="nav-btn"
        [class.active]="view() === 'camera' || view() === 'editor'"
        (click)="goToCamera()"
      >
        <span class="nav-icon">📷</span> Камера
      </button>
      <button
        class="nav-btn gallery-nav"
        [class.active]="view() === 'gallery'"
        (click)="goToGallery()"
      >
        <span class="nav-icon">🖼</span> Галерея
        @if (photos().length) {
          <span class="badge">{{ photos().length }}</span>
        }
      </button>
    </nav>

    @if (cloudGallery.currentUsername) {
      <div class="user-badge" title="Ваш псевдонім у спільній галереї">
        👤 {{ cloudGallery.currentUsername }}
      </div>
    }
  </header>

  <!-- Error banner -->
  @if (cloudGallery.error()) {
    <div class="error-banner">⚠️ {{ cloudGallery.error() }}</div>
  }

  <!-- Update banner -->
  @if (updateAvailable()) {
    <div class="update-banner">
      <span>🆕 Доступна нова версія</span>
      <button class="update-btn" (click)="activateUpdate()">Оновити</button>
    </div>
  }

  <!-- Main content -->
  <main class="app-main">
    @switch (view()) {
      @case ('camera') {
        <div class="center-pane">
          <app-camera (photoCaptured)="onPhotoCaptured($event)" />
        </div>
      }
      @case ('editor') {
        <app-editor
          [photoDataUrl]="currentPhoto()"
          [saving]="uploading()"
          (back)="goToCamera()"
          (saved)="onPhotoSaved($event)"
        />
      }
      @case ('gallery') {
        <app-gallery
          [photos]="photos()"
          [loading]="cloudGallery.loading()"
          [currentUserId]="cloudGallery.currentUserId"
          [hasMore]="cloudGallery.hasMore()"
          (back)="goToCamera()"
          (deletePhoto)="onDeletePhoto($event)"
          (loadMore)="cloudGallery.loadMore()"
        />
      }
    }
  </main>
</div>
